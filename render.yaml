services:
  - type: web
    runtime: node
    name: diy-meal-kit
    plan: starter
    buildCommand: npm install
    startCommand: node migrate.js && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
